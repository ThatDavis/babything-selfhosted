services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
     #ports:
     # - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    environment:
      # Path "cam" source is set from .env; falls back to a placeholder so
      # mediamtx starts cleanly even before a URL is configured.
      # sourceOnDemand means mediamtx only connects when someone is watching.
      MTX_PATHS_CAM_SOURCE: ${CAMERA_RTSP_URL:-rtsp://127.0.0.1/not-configured}
      MTX_PATHS_CAM_SOURCEONDEMAND: "yes"
      MTX_PATHS_CAM_SOURCEONDEMANDCLOSEAFTER: 10s
      MTX_PATHS_CAM_SOURCEPROTOCOL: tcp

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INVITE_SECRET: ${INVITE_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      APP_URL: ${APP_URL:-http://localhost}
      NODE_ENV: production
      CAMERA_RTSP_URL: ${CAMERA_RTSP_URL:-}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
      # - "${TLS_PORT:-443}:443"  # uncomment when TLS certs are configured
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./certs:/etc/nginx/certs:ro  # uncomment when TLS certs are configured
    depends_on:
      - api
      - web
      - mediamtx

volumes:
  postgres_data:
