events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  server {
    listen 80;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Uncomment the next line ONLY when TLS is active (prevents HTTP access via HSTS)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Use Docker's embedded DNS and re-resolve every 5s so nginx survives
    # container restarts without needing its own restart.
    resolver 127.0.0.11 valid=5s;
    set $api      api:3001;
    set $web      web:80;
    set $mediamtx mediamtx:8888;

    # ── Auth subrequest location (internal only) ──
    location = /auth/stream {
      internal;
      proxy_pass         http://$api/auth/stream;
      proxy_pass_request_body off;
      proxy_set_header   Content-Length "";
      proxy_set_header   X-Original-URI $request_uri;
    }

    location /socket.io/ {
      proxy_pass         http://$api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }

    location /api/ {
      rewrite            ^/api/(.*) /$1 break;
      proxy_pass         http://$api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    # HLS stream segments served by mediamtx
    # auth_request validates the session cookie before allowing access
    location /hls/ {
      auth_request       /auth/stream;
      rewrite            ^/hls/(.*) /$1 break;
      proxy_pass         http://$mediamtx;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      add_header         Cache-Control no-cache;
    }

    location / {
      proxy_pass         http://$web;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
    }
  }

  # ── TLS (uncomment and provide certs to enable HTTPS directly) ──
  # server {
  #   listen 443 ssl;
  #   server_name localhost;
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   include /etc/nginx/conf.d/default.conf;
  # }
}
