# Cloud deployment stack — Traefik + wildcard SSL + multi-tenant routing
# Usage: docker compose -f docker-compose.cloud.yml up -d
#
# Before first start, generate mTLS certs:
#   ./scripts/generate-mtls-certs

services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`operator.${ROOT_DOMAIN}`)"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth@file"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DEPLOYMENT_MODE: cloud
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INVITE_SECRET: ${INVITE_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_URL: https://${ROOT_DOMAIN}
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      COOKIE_DOMAIN: .${ROOT_DOMAIN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MTLS_ENABLED: "true"
      MTLS_PORT: 3003
      TLS_CERT_PATH: /certs/api-server.crt
      TLS_KEY_PATH: /certs/api-server.key
      TLS_CA_PATH: /certs/ca.crt
    volumes:
      - ./certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.${ROOT_DOMAIN}`) || Host(`${ROOT_DOMAIN}`)"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.services.api.loadbalancer.server.port=3001"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.${ROOT_DOMAIN}`) || Host(`${ROOT_DOMAIN}`)"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.services.web.loadbalancer.server.port=80"

  landing:
    build:
      context: ./platform/landing
      dockerfile: Dockerfile
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`${ROOT_DOMAIN}`)"
      - "traefik.http.routers.landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.landing.entrypoints=websecure"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

  provisioning:
    build:
      context: ./platform/provisioning
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3002
      DATABASE_URL: file:/data/provisioning.db
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      STRIPE_ANNUAL_PRICE_ID: ${STRIPE_ANNUAL_PRICE_ID}
      MAIN_APP_URL: https://api:3003
      MTLS_ENABLED: "true"
      TLS_CERT_PATH: /certs/provisioning-client.crt
      TLS_KEY_PATH: /certs/provisioning-client.key
      TLS_CA_PATH: /certs/ca.crt
    volumes:
      - provisioning_data:/data
      - ./certs:/certs:ro
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.provisioning.rule=Host(`${ROOT_DOMAIN}`) && PathPrefix(`/api/provisioning`)"
      - "traefik.http.routers.provisioning.tls.certresolver=letsencrypt"
      - "traefik.http.routers.provisioning.entrypoints=websecure"
      - "traefik.http.services.provisioning.loadbalancer.server.port=3002"
      - "traefik.http.middlewares.provisioning-strip.stripprefix.prefixes=/api/provisioning"
      - "traefik.http.routers.provisioning.middlewares=provisioning-strip"

volumes:
  postgres_data:
  redis_data:
  provisioning_data:
  letsencrypt:
