# Cloud deployment stack — nginx + multi-tenant routing
# Usage: docker compose -f docker-compose.cloud.yml up -d
#
# Before first start, generate mTLS certs:
#   ./scripts/generate-mtls-certs
#
# This stack is designed to run behind an external reverse proxy (nginx, Caddy,
# Cloudflare, etc.) that terminates TLS and forwards plain HTTP to port 80.
# The included nginx service handles subdomain routing and path-based proxies.
# Set TRUSTED_PROXIES so the API sees real client IPs.

networks:
  frontend:
  backend:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [backend]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [backend]
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  api:
    image: ghcr.io/thatdavis/babything-cloud-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks: [frontend, backend]
    environment:
      DEPLOYMENT_MODE: cloud
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INVITE_SECRET: ${INVITE_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_URL: ${APP_URL}
      NODE_ENV: production
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.${ROOT_DOMAIN}}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      PROVISIONING_URL: http://provisioning:3002
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      MTLS_ENABLED: "true"
      MTLS_PORT: 3003
      TLS_CERT_PATH: /certs/api-server.crt
      TLS_KEY_PATH: /certs/api-server.key
      TLS_CA_PATH: /certs/ca.crt
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
    volumes:
      - ./certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    image: ghcr.io/thatdavis/babything-cloud-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks: [frontend]
    # The web SPA is built with VITE_API_URL=/api so all API calls are relative.
    # The nginx reverse proxy routes /api/* to the API service.
    depends_on:
      - api

  landing:
    image: ghcr.io/thatdavis/babything-cloud-landing:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks: [frontend, backend]
    environment:
      PORT: 80
    depends_on:
      - provisioning

  operator:
    image: ghcr.io/thatdavis/babything-cloud-operator:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks: [frontend, backend]
    environment:
      PORT: 80
    depends_on:
      - api

  provisioning:
    image: ghcr.io/thatdavis/babything-cloud-provisioning:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks: [frontend, backend]
    environment:
      PORT: 3002
      DATABASE_URL: file:/data/provisioning.db
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      STRIPE_ANNUAL_PRICE_ID: ${STRIPE_ANNUAL_PRICE_ID}
      STRIPE_BYPASS: ${STRIPE_BYPASS:-}
      MAIN_APP_URL: https://api:3003
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      MTLS_ENABLED: "true"
      TLS_CERT_PATH: /certs/provisioning-client.crt
      TLS_KEY_PATH: /certs/provisioning-client.key
      TLS_CA_PATH: /certs/ca.crt
    volumes:
      - provisioning_data:/data
      - ./certs:/certs:ro
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    networks: [frontend]
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.cloud.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
      - landing
      - provisioning
      - operator

volumes:
  postgres_data:
  redis_data:
  provisioning_data:
