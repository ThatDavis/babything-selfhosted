services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [backend]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    networks: [backend]
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    environment:
      MTX_PATHS_CAM_SOURCE: ${CAMERA_RTSP_URL:-rtsp://127.0.0.1/not-configured}
      MTX_PATHS_CAM_SOURCEONDEMAND: "yes"
      MTX_PATHS_CAM_SOURCEONDEMANDCLOSEAFTER: 10s
      MTX_PATHS_CAM_SOURCEPROTOCOL: tcp

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    networks: [frontend, backend]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      INVITE_SECRET: ${INVITE_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      APP_URL: ${APP_URL:-http://localhost}
      NODE_ENV: production
      CAMERA_RTSP_URL: ${CAMERA_RTSP_URL:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-hello@babything.app}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Babything}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    networks: [frontend]
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [backend]
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    networks: [frontend]
    ports:
      - "${PORT:-80}:80"
      # - "${TLS_PORT:-443}:443"  # uncomment when TLS certs are configured
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./certs:/etc/nginx/certs:ro  # uncomment when TLS certs are configured
    depends_on:
      - api
      - web
      - mediamtx

networks:
  frontend:
  backend:

volumes:
  postgres_data:
  redis_data:
