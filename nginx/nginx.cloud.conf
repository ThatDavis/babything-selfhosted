events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # ── Subdomain server: serves the React SPA on all tenant subdomains ──
  server {
    listen 80;
    server_name ~^(?<subdomain>[a-z0-9-]+)\..+$;

    # Use Docker's embedded DNS and re-resolve every 5s so nginx survives
    # container restarts without needing its own restart.
    resolver 127.0.0.11 valid=5s;
    set $api api:3001;
    set $web web:80;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # WebSocket support for Socket.io
    location /socket.io/ {
      proxy_pass         http://$api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }

    # API routes
    location /api/ {
      rewrite            ^/api/(.*) /$1 break;
      proxy_pass         http://$api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Everything else → React SPA
    location / {
      proxy_pass         http://$web;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }
  }

  # ── Root domain server: landing page + API + provisioning ──
  server {
    listen 80;
    server_name _;  # catch-all, but evaluated after the regex above

    # Use Docker's embedded DNS and re-resolve every 5s so nginx survives
    # container restarts without needing its own restart.
    resolver 127.0.0.11 valid=5s;
    set $api api:3001;
    set $landing landing:80;
    set $provisioning provisioning:3002;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # WebSocket support for Socket.io
    location /socket.io/ {
      proxy_pass         http://$api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }

    # Provisioning API (Stripe webhooks, etc.)
    location /api/provisioning/ {
      rewrite            ^/api/provisioning/(.*) /$1 break;
      proxy_pass         http://$provisioning;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Main API
    location /api/ {
      rewrite            ^/api/(.*) /$1 break;
      proxy_pass         http://$api;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Everything else → landing page
    location / {
      proxy_pass         http://$landing;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }
  }
}
